# =====================================================
# TMUX CONFIG — Ghostty + Minimal Tabs + Folder Names
# =====================================================

# Reset / Base
source-file ~/.config/tmux/tmux.reset.conf

# Terminal / Colors
set -g default-terminal "screen-256color"
set -g terminal-overrides ",xterm-256color:RGB"

# =====================================================
# General Settings
# =====================================================

set -g prefix ^A
set -g mouse on
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g set-clipboard on

setw -g mode-keys vi

# =====================================================
# Status Bar
# =====================================================

set -g status on
set -g status-position top
set -g status-justify left
set -g status-bg black
set -g status-fg white

set -g status-left ""
set -g status-right ""

# Second invisible status bar for margin
set -g status 2
set -g status-format[0] '#[bg=#777777,fg=#ffffff,bold] #I #{b:pane_current_path} '
set -g status-format[1] '#[bg=#000000]'

# =====================================================
# Window Names = Current Folder
# =====================================================

set -g automatic-rename off

setw -g window-status-separator ""

# Inactive tabs
setw -g window-status-format '#[bg=black,fg=white] #I #{b:pane_current_path} '

# Active tab (highlighted)
setw -g window-status-current-format '#[bg=brightblack,fg=brightwhite,bold] #I #{b:pane_current_path} '

# =====================================================
# Pane Styling
# =====================================================

set -g window-style 'bg=default,fg=white'
set -g window-active-style 'bg=default,fg=brightwhite'

set -g pane-border-style 'fg=black'
set -g pane-active-border-style 'fg=brightblack'

# =====================================================
# Keybindings
# =====================================================

bind-key w kill-pane
bind-key t new-window

# =====================================================
# TPM / Plugins
# =====================================================

set -g @tpm-install "i"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'

# =====================================================
# Plugin Config
# =====================================================

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# =====================================================
# Start TPM
# =====================================================

run '~/.tmux/plugins/tpm/tpm'